  ul { padding-left: 20px; }
  li { margin-bottom: 6px; }
  a { color: var(--amber); }
  hr { border: none; border-top: 1px solid var(--border); margin: 32px 0 20px; }
  .foot { color: var(--sub); font-size: 12px; font-style: italic; }
